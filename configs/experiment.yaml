# experiment.yaml
# ----------------
# Configuration for the C-OPN PD vs Atypical Parkinsonism pipeline.
#
# Run the full pipeline with:
#   python train_models.py --data-dir /path/to/csvs
#
# Output files (written to results/):
#   copn_pd_vs_ap_train_pca.csv   — preprocessed + PCA-reduced train set
#   copn_pd_vs_ap_test_pca.csv    — preprocessed + PCA-reduced test set
#   cv_results.csv                — 5-fold CV metrics (mean ± std per model)
#   model_results.csv             — held-out test set metrics
#   model_results.md              — full markdown report
#   experiment_summary.json       — run metadata

# ── Split ──────────────────────────────────────────────────────────────────
random_seed: 42
test_size: 0.20          # 80% train, 20% held-out test

# ── Dimensionality reduction ────────────────────────────────────────────────
# StandardScaler → median imputation (train-only) → PCA
variance_target: 0.85    # retain components explaining 85% of variance
max_pca_components: 30   # hard ceiling on component count

# ── Models ─────────────────────────────────────────────────────────────────
# Four models covering different approaches to imbalanced tabular classification:
#   logistic_regression  — linear, ElasticNet regularised, class_weight=balanced
#   random_forest        — bagging ensemble, class_weight=balanced_subsample
#   lightgbm             — gradient boosting, scale_pos_weight
#   easy_ensemble        — designed for extreme imbalance (~6% minority)

# ── Evaluation ─────────────────────────────────────────────────────────────
cv_folds: 5              # stratified k-fold on train set
# Primary metric: balanced_accuracy
# Secondary: ap_recall_sensitivity, auc_roc